name: 🔒 Security — SAST, SBOM, Vulnerabilities

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Tous les lundis à 3h UTC

jobs:
  # ── SAST Python (Bandit) ──────────────────────────────────────────────────
  sast:
    name: 🔍 SAST — Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r backend/app \
            --exclude backend/app/tests \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Dépendances vulnérables (Safety) ──────────────────────────────────────
  dependency-check:
    name: 🛡️  Dependency Audit — Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety check
        run: |
          safety check \
            --file backend/requirements.txt \
            --output json > safety-report.json || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json

  # ── SBOM (CycloneDX) ──────────────────────────────────────────────────────
  sbom:
    name: 📋 SBOM — CycloneDX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CycloneDX
        run: pip install cyclonedx-bom

      - name: Generate SBOM
        run: |
          pip install -r backend/requirements.txt --quiet
          cyclonedx-py pip \
            --index-url https://pypi.org/simple \
            -o sbom.json \
            --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # ── Scan image Docker (Trivy) ──────────────────────────────────────────────
  trivy:
    name: 🐳 Container Scan — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ml-analytics-api:scan backend/

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    'ml-analytics-api:scan'
          format:       'sarif'
          output:       'trivy-results.sarif'
          severity:     'CRITICAL,HIGH'
          exit-code:    '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
