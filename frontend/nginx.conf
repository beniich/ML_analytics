server {
    # ── Redirection Forcée HTTP 👉 HTTPS ──
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    # ── Serveur Sécurisé HTTPS ──
    listen 443 ssl;
    server_name localhost;

    # Certificats SSL auto-signés générés localement
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Protocoles de chiffrements sécurisés et modernes
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de sécurité standards
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # Logs Nginx
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ── Serveur des fichiers statiques React ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse Proxy vers l'API (Backend) ──
    # Redirige toute requête /api/... vers le conteneur `backend` port 8000
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support pour FastAPI / Uvicorn (si nécessaire)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout optimisé pour les analyses longues
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
